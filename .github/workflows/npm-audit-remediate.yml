name: npm audit remediate

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: npm-audit-remediate
  cancel-in-progress: false

jobs:
  remediate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install current lockfile
        run: npm ci --legacy-peer-deps --ignore-scripts
      - name: Audit current dependency graph
        id: audit
        continue-on-error: true
        run: npm audit --audit-level=moderate --json > audit-before.json
      - name: Stop if clean
        if: steps.audit.outcome == 'success'
        run: echo "npm audit passed. No remediation PR needed."
      - name: Apply lockfile-only audit fix
        if: steps.audit.outcome == 'failure'
        run: npm audit fix --package-lock-only --ignore-scripts
      - name: Reject package.json changes
        if: steps.audit.outcome == 'failure'
        run: git diff --exit-code -- package.json
      - name: Stop if lockfile did not change
        if: steps.audit.outcome == 'failure'
        id: diff
        continue-on-error: true
        run: git diff --exit-code -- package-lock.json
      - name: Install updated lockfile
        if: steps.audit.outcome == 'failure' && steps.diff.outcome == 'failure'
        run: npm ci --legacy-peer-deps --ignore-scripts
      - name: Verify audit is clean
        if: steps.audit.outcome == 'failure' && steps.diff.outcome == 'failure'
        run: npm audit --audit-level=moderate
      - name: Verify npm signatures
        if: steps.audit.outcome == 'failure' && steps.diff.outcome == 'failure'
        run: npm audit signatures
      - name: Lint
        if: steps.audit.outcome == 'failure' && steps.diff.outcome == 'failure'
        run: npm run lint --if-present
      - name: Build
        if: steps.audit.outcome == 'failure' && steps.diff.outcome == 'failure'
        run: npm run build
      - name: Test
        if: steps.audit.outcome == 'failure' && steps.diff.outcome == 'failure'
        run: npm run test:ci
      - name: Verify package contents
        if: steps.audit.outcome == 'failure' && steps.diff.outcome == 'failure'
        run: npm pack --dry-run
      - name: Create remediation branch and PR
        if: steps.audit.outcome == 'failure' && steps.diff.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_BODY: |
            This PR was generated by the controlled npm audit remediation workflow.

            Scope:
            - Triggered only because npm audit detected vulnerabilities
            - Updated package-lock.json only
            - package.json changes are rejected
            - npm install scripts are disabled
            - npm audit, npm audit signatures, lint, build, test, and npm pack --dry-run passed

            Policy:
            - Dependabot version updates are not used
            - Auto-merge is prohibited
            - This PR must pass the normal CI gate before merge
        run: |
          BRANCH="security/npm-audit-lockfile-fix"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add package-lock.json
          git commit -m "security: apply npm audit lockfile fix"
          git push --force-with-lease origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "security: apply npm audit lockfile fix" \
            --body "$PR_BODY"
