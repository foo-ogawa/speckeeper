name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Security audit
        run: docker run --rm -v "$(pwd)":/app:ro -w /app node:22-alpine npm audit

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - name: Checkout agent-contracts-analyzer (private devDependency)
        uses: actions/checkout@v4
        with:
          repository: foo-log-inc/agent-contracts-analyzer
          ref: v0.1.1
          path: .vendor/agent-contracts-analyzer
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      - name: Build test container
        run: docker compose -f docker-compose.test.yml build --build-arg NODE_VERSION=${{ matrix.node-version }}
      - name: Run tests
        run: docker compose -f docker-compose.test.yml run --rm test
