# yaml-language-server: $schema=./node_modules/cli-contracts/schemas/cli-contract.schema.json
cli_contracts: 0.1.0

info:
  title: speckeeper CLI
  version: 0.15.1
  description: >-
    TypeScript-first specification validation framework — validate design
    consistency, external SSOT integrity, and traceability with type-safe
    TypeScript DSL. Supports design lint, external source checks (OpenAPI,
    DDL, annotations), drift detection, impact analysis, and scaffolding
    from Mermaid flowcharts.
  license:
    name: MIT

artifact_slots:
  design-specs:
    direction: read
    description: Design specification files (requirements, architecture)
  config:
    direction: read
    description: speckeeper configuration
  codebase:
    direction: read
    description: Source code for traceability and coverage checks
  external-sources:
    direction: read
    description: External SSOT sources (OpenAPI, DDL, annotations)
  audit-report:
    direction: write
    description: LLM audit and analysis output
  scaffold-output:
    direction: write
    description: Scaffolded specification files

command_sets:
  speckeeper:
    summary: Requirements and design management framework with TypeScript DSL.
    executable: speckeeper

    env:
      CURSOR_API_KEY:
        description: API key for Cursor SDK adapter.
        sensitive: true
      GEMINI_API_KEY:
        description: API key for Gemini adapter.
        sensitive: true
      OPENAI_API_KEY:
        description: API key for OpenAI adapter.
        sensitive: true
      ANTHROPIC_API_KEY:
        description: API key for Anthropic/Claude adapter.
        sensitive: true

    global_options:
      - name: version
        aliases: [V]
        description: Print version and exit.
        schema:
          type: boolean

      - name: help
        aliases: [h]
        description: Show help and exit.
        schema:
          type: boolean

    commands:
      # ── init ──────────────────────────────────────────
      init:
        summary: Initialize a new speckeeper project with starter templates.
        description: >-
          Copies starter template files (speckeeper.config.ts, design/
          directory structure) into the current project. Provides a minimal
          working setup with generic models and example specs.
        usage:
          - speckeeper init
          - speckeeper init --force
          - speckeeper init --format yaml

        effects:
          risk_level: medium
          writes:
            - target: "speckeeper.config.ts, design/ directory"
              description: "generates config and starter template files"
              idempotent: false

        options:
          - name: force
            aliases: [F]
            description: Overwrite existing files.
            schema:
              type: boolean
              default: false
            effects:
              risk_level: high
              writes:
                - target: "existing project files"
                  description: "overwrites existing config and design files"
                  overwrite: true
                  destructive: true

          - name: format
            description: "Spec data format: ts (default) or yaml."
            value_name: format
            schema:
              type: string
              default: ts
              enum: [ts, yaml]

        exits:
          '0':
            description: Project initialized successfully.
            stdout:
              format: text

          '1':
            description: Initialization failed (files already exist without --force).
            stderr:
              format: text

      # ── build ─────────────────────────────────────────
      build:
        summary: Generate docs/ and specs/ from TypeScript models.
        description: >-
          Loads the design TypeScript models and generates machine-readable
          specs/ output and optionally human-readable docs/ output. Supports
          markdown, JSON, or both formats.
        usage:
          - speckeeper build
          - speckeeper build --format json --output ./out
          - speckeeper build --verbose

        effects:
          risk_level: low
          writes:
            - target: "docs/ directory"
              description: "generated Markdown documentation files"
              overwrite: true
              idempotent: true

        options:
          - name: config
            aliases: [c]
            description: Path to config file.
            value_name: path
            schema:
              type: string
            file:
              mode: read
              exists: true
              encoding: utf-8

          - name: output
            aliases: [o]
            description: Base output directory path.
            value_name: path
            schema:
              type: string
              default: "."

          - name: format
            aliases: [f]
            description: "Output format: markdown, json, both."
            value_name: format
            schema:
              type: string
              default: both
              enum: [markdown, json, both]

          - name: watch
            aliases: [w]
            description: Watch for changes and auto-regenerate.
            schema:
              type: boolean
              default: false
            effects:
              executionMode: watch

          - name: verbose
            aliases: [v]
            description: Show detailed output.
            schema:
              type: boolean
              default: false

        exits:
          '0':
            description: Build completed successfully.
            stdout:
              format: text

          '1':
            description: Build failed (config error, model loading error, or generation error).
            stderr:
              format: text

      # ── lint ──────────────────────────────────────────
      lint:
        summary: Check design integrity (ID duplicates, references, layer violations, etc.).
        description: >-
          Validates design models for structural integrity. Checks include
          ID uniqueness, ID naming conventions, reference integrity, circular
          dependency detection, phase gate enforcement, and custom model-specific
          lint rules.
        usage:
          - speckeeper lint
          - speckeeper lint --strict --format github
          - speckeeper lint --phase HLD

        options:
          - name: config
            aliases: [c]
            description: Path to config file.
            value_name: path
            schema:
              type: string
            file:
              mode: read
              exists: true
              encoding: utf-8

          - name: phase
            aliases: [p]
            description: "Phase gate to check against: REQ, HLD, LLD, OPS."
            value_name: phase
            schema:
              type: string
              enum: [REQ, HLD, LLD, OPS]

          - name: strict
            aliases: [s]
            description: Treat warnings as errors.
            schema:
              type: boolean
              default: false

          - name: fix
            description: Attempt to fix auto-fixable issues (not yet implemented).
            schema:
              type: boolean
              default: false

          - name: format
            aliases: [f]
            description: "Output format: text, json, github."
            value_name: format
            schema:
              type: string
              default: text
              enum: [text, json, github]

        exits:
          '0':
            description: No lint issues found.
            stdout:
              format: '{options.format}'

          '1':
            description: Lint issues found (errors or warnings with --strict).
            stdout:
              format: '{options.format}'

        x-agent:
          idempotent: true

      # ── drift ─────────────────────────────────────────
      drift:
        summary: Check if generated files have been manually edited.
        description: >-
          Compares generated files against their expected content to detect
          manual edits (drift). Useful for CI pipelines to ensure generated
          docs/ files stay in sync with model definitions.
        usage:
          - speckeeper drift
          - speckeeper drift --fail-on-drift

        options:
          - name: config
            aliases: [c]
            description: Path to config file.
            value_name: path
            schema:
              type: string
            file:
              mode: read
              exists: true
              encoding: utf-8

          - name: update
            aliases: [u]
            description: Auto-update if differences are found (not yet implemented).
            schema:
              type: boolean
              default: false

          - name: format
            aliases: [f]
            description: "Output format: text, json, diff."
            value_name: format
            schema:
              type: string
              default: text
              enum: [text, json, diff]

          - name: fail-on-drift
            description: Exit with code 1 if drift is detected (for CI).
            schema:
              type: boolean
              default: false

        exits:
          '0':
            description: No drift detected.
            stdout:
              format: '{options.format}'

          '1':
            description: Drift detected (with --fail-on-drift).
            stdout:
              format: '{options.format}'

        x-agent:
          idempotent: true

      # ── check ─────────────────────────────────────────
      check:
        summary: Check external SSOT conformance (including custom models).
        description: >-
          Validates specifications against actual implementation artifacts
          using a global source scan. Performs existence checks, optional
          structural checks (via deep validation), and optional type checks.
          Sources include OpenAPI, DDL, annotations, and custom scanners.
        usage:
          - speckeeper check
          - speckeeper check external-ssot --verbose
          - speckeeper check test --coverage

        arguments:
          - name: type
            index: 0
            required: false
            description: >-
              Type of check to run. Filters sources by type.
            schema:
              type: string
              enum: [external-ssot, openapi, ddl, iac, custom, all, test]

        options:
          - name: config
            aliases: [c]
            description: Path to config file.
            value_name: path
            schema:
              type: string
            file:
              mode: read
              exists: true
              encoding: utf-8

          - name: strict
            description: Treat warnings as errors.
            schema:
              type: boolean
              default: false

          - name: verbose
            aliases: [v]
            description: Show detailed output.
            schema:
              type: boolean
              default: false

          - name: coverage
            description: Check if all testable acceptance criteria are covered by TestRefs.
            schema:
              type: boolean
              default: false

        exits:
          '0':
            description: All checks passed.
            stdout:
              format: text

          '1':
            description: Check failures found.
            stdout:
              format: text

        x-agent:
          idempotent: true

      # ── new ───────────────────────────────────────────
      new:
        summary: Create a new element with auto-generated ID.
        description: >-
          Generates a new design element file with a unique auto-generated ID
          based on the model's ID prefix and existing elements.
        usage:
          - speckeeper new requirement --name "User Authentication"
          - speckeeper new entity

        effects:
          risk_level: low
          writes:
            - target: "design/ directory"
              description: "new TypeScript spec file with auto-generated ID"
              idempotent: false

        arguments:
          - name: type
            index: 0
            required: true
            description: >-
              Element type to create.
            schema:
              type: string
              enum: [requirement, usecase, entity, component, screen, flow, error-case, term]

        options:
          - name: kind
            aliases: [k]
            description: Sub-kind (e.g. functional, non-functional for requirements).
            value_name: kind
            schema:
              type: string

          - name: name
            aliases: [n]
            description: Name of the element.
            value_name: name
            schema:
              type: string

          - name: output
            aliases: [o]
            description: Output directory path.
            value_name: path
            schema:
              type: string

          - name: template
            aliases: [t]
            description: Path to template file.
            value_name: path
            schema:
              type: string
            file:
              mode: read
              exists: true
              encoding: utf-8

          - name: dry-run
            description: Preview generated file content without writing.
            schema:
              type: boolean
              default: false

        exits:
          '0':
            description: Element file created (or previewed with --dry-run).
            stdout:
              format: text

          '1':
            description: Creation failed.
            stderr:
              format: text

      # ── impact ────────────────────────────────────────
      impact:
        summary: Analyze impact of changes to an ID.
        description: >-
          Performs change impact analysis by traversing the relation graph
          starting from the specified spec ID.
        usage:
          - speckeeper impact FR-001
          - speckeeper impact ENT-ORDER --depth 5
          - speckeeper impact COMP-AUTH --format mermaid

        arguments:
          - name: id
            index: 0
            required: true
            description: "Spec ID to analyze (e.g. REQ-001, ENT-ORDER)."
            schema:
              type: string

        options:
          - name: config
            aliases: [c]
            description: Path to config file.
            value_name: path
            schema:
              type: string
            file:
              mode: read
              exists: true
              encoding: utf-8

          - name: depth
            aliases: [d]
            description: Analysis depth (reference tracking level).
            value_name: n
            schema:
              type: integer
              minimum: 1
              default: 3

          - name: direction
            description: "Analysis direction: upstream, downstream, both."
            value_name: direction
            schema:
              type: string
              default: both
              enum: [upstream, downstream, both]

          - name: format
            aliases: [f]
            description: "Output format: text, json, mermaid."
            value_name: format
            schema:
              type: string
              default: text
              enum: [text, json, mermaid]

        exits:
          '0':
            description: Impact analysis completed.
            stdout:
              format: '{options.format}'

          '1':
            description: Analysis failed (ID not found or config error).
            stderr:
              format: text

        x-agent:
          idempotent: true

      # ── insights ──────────────────────────────────────
      insights:
        summary: Export spec relation edges as ExternalInsight JSON.
        description: >-
          Walks all design spec relations and outputs structured edges
          for agent-contracts-analyzer External Insight Provider integration.
        usage:
          - speckeeper insights --format json
          - speckeeper insights --format json --project-root .

        options:
          - name: format
            aliases: [f]
            description: "Output format (json only)."
            value_name: format
            schema:
              type: string
              default: json
              enum: [json]

          - name: project-root
            description: Project root directory containing speckeeper.config.
            value_name: path
            schema:
              type: string
              default: .

          - name: config
            aliases: [c]
            description: Path to config file.
            value_name: path
            schema:
              type: string
            file:
              mode: read
              exists: true
              encoding: utf-8

        exits:
          '0':
            description: ExternalInsight JSON emitted to stdout.
            stdout:
              format: json

          '1':
            description: Export failed (config error or internal error).
            stderr:
              format: text

        x-agent:
          idempotent: true

      # ── scaffold ──────────────────────────────────────
      scaffold:
        summary: Generate _models/ from a Mermaid flowchart definition.
        description: >-
          Parses a Mermaid flowchart from a Markdown file and generates
          TypeScript model classes, spec data files, and an index file.
        usage:
          - speckeeper scaffold --source requirements.md
          - speckeeper scaffold --source flow.md --output design/ --force
          - speckeeper scaffold --source arch.md --dry-run
          - speckeeper scaffold --source arch.md --format yaml

        effects:
          risk_level: low
          writes:
            - target: "design/ directory"
              description: "generated _models/ and spec data files"
              idempotent: false

        options:
          - name: source
            aliases: [s]
            description: Path to Markdown file containing Mermaid flowchart.
            value_name: path
            required: true
            schema:
              type: string
            file:
              mode: read
              exists: true
              encoding: utf-8

          - name: output
            aliases: [o]
            description: Output directory.
            value_name: path
            schema:
              type: string
              default: design/

          - name: force
            aliases: [F]
            description: Overwrite existing files.
            schema:
              type: boolean
              default: false
            effects:
              risk_level: medium
              writes:
                - target: "existing model and spec files"
                  description: "overwrites existing TypeScript model source files"
                  overwrite: true

          - name: dry-run
            description: Preview generated files without writing.
            schema:
              type: boolean
              default: false

          - name: format
            description: "Spec data format: ts (default) or yaml."
            value_name: format
            schema:
              type: string
              default: ts
              enum: [ts, yaml]

        exits:
          '0':
            description: Model files generated (or previewed with --dry-run).
            stdout:
              format: text

          '1':
            description: Scaffold failed.
            stderr:
              format: text

        x-agent:
          recommended_before_use:
            - "Run with --dry-run first to preview generated files"

      # ── convert ───────────────────────────────────────
      convert:
        summary: Convert a TS spec data file to YAML format.
        description: >-
          Reads a TypeScript spec data file that exports a SpecModule via
          defineSpecs(), extracts model IDs and spec data, and writes the
          equivalent YAML file. Supports --dry-run for preview.
        usage:
          - speckeeper convert design/glossary.ts
          - speckeeper convert design/requirements.ts --output reqs.yaml
          - speckeeper convert design/glossary.ts --dry-run

        effects:
          risk_level: low
          writes:
            - target: ".yaml output file"
              description: "YAML conversion of the TS spec data"
              idempotent: true

        arguments:
          - name: file
            index: 0
            required: true
            description: Path to TS spec data file.
            schema:
              type: string

        options:
          - name: output
            aliases: [o]
            description: "Output file path (default: same name with .yaml extension)."
            value_name: path
            schema:
              type: string
            file:
              mode: write
              encoding: utf-8

          - name: dry-run
            aliases: [n]
            description: Preview conversion without writing.
            schema:
              type: boolean
              default: false

        exits:
          '0':
            description: Conversion completed (or previewed with --dry-run).
            stdout:
              format: text

          '1':
            description: Conversion failed (file not found, invalid module, or write error).
            stderr:
              format: text

      # ── audit-requirements ──────────────────────────────
      audit-requirements:
        summary: Run LLM-based requirement quality audit.
        description: >-
          Performs semantic analysis of design specs using LLM to identify
          quality issues that static lint cannot detect.

        effects:
          network:
            description: LLM API calls to configured provider
            idempotent: true

        usage:
          - speckeeper audit-requirements
          - speckeeper audit-requirements --adapter gemini --show-prompt
          - speckeeper audit-requirements --report-format json --output audit.json

        options:
          - name: config
            aliases: [c]
            description: Path to config file.
            value_name: path
            schema:
              type: string
            file:
              mode: read
              exists: true
              encoding: utf-8

          - name: adapter
            aliases: [a]
            description: SDK adapter to use for LLM execution.
            value_name: name
            schema:
              type: string
              enum: [cursor, claude, openai, gemini, mock]

          - name: model
            description: LLM model override.
            value_name: name
            schema:
              type: string

          - name: fail-on
            description: Minimum severity that causes a non-zero exit.
            value_name: level
            schema:
              type: string
              enum: [warning, error, critical]
              default: error

          - name: output
            aliases: [o]
            description: Write result to a file instead of stdout.
            value_name: file
            schema:
              type: string
            file:
              mode: write
              encoding: utf-8

          - name: report-format
            description: Output format for the audit report.
            value_name: fmt
            schema:
              type: string
              enum: [json, text, yaml]
              default: json

          - name: log-file
            aliases: [l]
            description: Write agent progress log to this file path.
            schema:
              type: string

          - name: show-prompt
            description: Output the constructed prompt without calling the LLM API.
            schema:
              type: boolean
              default: false

        exits:
          '0':
            description: Audit completed, no blocking findings.
            stdout:
              format: '{options.report-format}'
              schema:
                $ref: '#/components/schemas/RequirementAuditResult'

          '1':
            description: Unexpected error.
            stderr:
              format: text

          '2':
            description: Configuration or input error.
            stderr:
              format: text

          '10':
            description: Completed with blocking findings.
            stdout:
              format: '{options.report-format}'
              schema:
                $ref: '#/components/schemas/RequirementAuditResult'

          '11':
            description: Runtime dependency missing (agent-contracts-runtime).
            stderr:
              format: text

          '12':
            description: LLM provider or adapter error.
            stderr:
              format: text

        x-agent:
          dsl_task: audit-requirement-quality
          safeDryRunOption: show-prompt
          sideEffectNote: >-
            Makes network calls to the configured LLM provider when adapter is
            not mock. Filesystem write only when --output is specified.
          expectedDurationMs: 120000
          recommended_before_use:
            - "Run with --show-prompt first to preview the prompt"
          retryableExitCodes: [1, 12]

      # ── propose-trace-links ─────────────────────────────
      propose-trace-links:
        summary: LLM-based traceability link proposal.
        description: >-
          Analyzes spec definitions and external source scan results to
          propose candidate traceability links.

        effects:
          network:
            description: LLM API calls to configured provider
            idempotent: true

        usage:
          - speckeeper propose-trace-links
          - speckeeper propose-trace-links --adapter claude --report-format json

        options:
          - name: config
            aliases: [c]
            description: Path to config file.
            value_name: path
            schema:
              type: string
            file:
              mode: read
              exists: true
              encoding: utf-8

          - name: adapter
            aliases: [a]
            description: SDK adapter to use for LLM execution.
            value_name: name
            schema:
              type: string
              enum: [cursor, claude, openai, gemini, mock]

          - name: model
            description: LLM model override.
            value_name: name
            schema:
              type: string

          - name: fail-on
            description: Minimum severity that causes a non-zero exit.
            value_name: level
            schema:
              type: string
              enum: [warning, error, critical]
              default: error

          - name: output
            aliases: [o]
            description: Write result to a file instead of stdout.
            value_name: file
            schema:
              type: string
            file:
              mode: write
              encoding: utf-8

          - name: report-format
            description: Output format for the report.
            value_name: fmt
            schema:
              type: string
              enum: [json, text, yaml]
              default: json

          - name: log-file
            aliases: [l]
            description: Write agent progress log to this file path.
            schema:
              type: string

          - name: show-prompt
            description: Output the constructed prompt without calling the LLM API.
            schema:
              type: boolean
              default: false

        exits:
          '0':
            description: Proposal completed, no blocking findings.
            stdout:
              format: '{options.report-format}'
              schema:
                $ref: '#/components/schemas/TraceLinkResult'

          '1':
            description: Unexpected error.
            stderr:
              format: text

          '2':
            description: Configuration or input error.
            stderr:
              format: text

          '10':
            description: Completed with blocking findings.
            stdout:
              format: '{options.report-format}'
              schema:
                $ref: '#/components/schemas/TraceLinkResult'

          '11':
            description: Runtime dependency missing (agent-contracts-runtime).
            stderr:
              format: text

          '12':
            description: LLM provider or adapter error.
            stderr:
              format: text

        x-agent:
          dsl_task: propose-trace-links
          safeDryRunOption: show-prompt
          sideEffectNote: >-
            Makes network calls to the configured LLM provider when adapter is
            not mock. Filesystem write only when --output is specified.
          expectedDurationMs: 120000
          recommended_before_use:
            - "Run with --show-prompt first to preview the prompt"
          retryableExitCodes: [1, 12]

      # ── explain-impact ──────────────────────────────────
      explain-impact:
        summary: LLM-based explanation of impact analysis output.
        description: >-
          Reads JSON output from speckeeper impact on stdin and generates
          a human-readable explanation.

        effects:
          network:
            description: LLM API calls to configured provider
            idempotent: true

        stdin:
          required: true
          format: json
          description: >-
            JSON output from speckeeper impact --format json.
          schema:
            $ref: '#/components/schemas/ImpactAnalysisOutput'

        usage:
          - speckeeper impact FR-001 --format json | speckeeper explain-impact
          - speckeeper impact ENT-ORDER --format json | speckeeper explain-impact --adapter claude

        options:
          - name: adapter
            aliases: [a]
            description: SDK adapter to use for LLM execution.
            value_name: name
            schema:
              type: string
              enum: [cursor, claude, openai, gemini, mock]

          - name: model
            description: LLM model override.
            value_name: name
            schema:
              type: string

          - name: fail-on
            description: Minimum severity that causes a non-zero exit.
            value_name: level
            schema:
              type: string
              enum: [warning, error, critical]
              default: error

          - name: output
            aliases: [o]
            description: Write result to a file instead of stdout.
            value_name: file
            schema:
              type: string
            file:
              mode: write
              encoding: utf-8

          - name: report-format
            description: Output format for the report.
            value_name: fmt
            schema:
              type: string
              enum: [json, text, yaml]
              default: json

          - name: log-file
            aliases: [l]
            description: Write agent progress log to this file path.
            schema:
              type: string

          - name: show-prompt
            description: Output the constructed prompt without calling the LLM API.
            schema:
              type: boolean
              default: false

        exits:
          '0':
            description: Explanation completed successfully.
            stdout:
              format: '{options.report-format}'
              schema:
                $ref: '#/components/schemas/ImpactExplainResult'

          '1':
            description: Unexpected error.
            stderr:
              format: text

          '2':
            description: No input on stdin.
            stderr:
              format: text

          '10':
            description: Completed with blocking findings.
            stdout:
              format: '{options.report-format}'
              schema:
                $ref: '#/components/schemas/ImpactExplainResult'

          '11':
            description: Runtime dependency missing (agent-contracts-runtime).
            stderr:
              format: text

          '12':
            description: LLM provider or adapter error.
            stderr:
              format: text

        x-agent:
          dsl_task: explain-impact-result
          safeDryRunOption: show-prompt
          sideEffectNote: >-
            Makes network calls to the configured LLM provider when adapter is
            not mock. Filesystem write only when --output is specified.
          expectedDurationMs: 120000
          recommended_before_use:
            - "Run with --show-prompt first to preview the prompt"
          retryableExitCodes: [1, 12]

      # ── propose-acceptance-criteria ─────────────────────
      propose-acceptance-criteria:
        summary: LLM-based acceptance criteria proposal.
        description: >-
          Analyzes design specs and proposes testable acceptance criteria.

        effects:
          network:
            description: LLM API calls to configured provider
            idempotent: true

        usage:
          - speckeeper propose-acceptance-criteria
          - speckeeper propose-acceptance-criteria FR-001 FR-002
          - speckeeper propose-acceptance-criteria --adapter gemini --show-prompt

        arguments:
          - name: specIds
            index: 0
            required: false
            variadic: true
            description: >-
              Spec IDs to propose criteria for. Defaults to all specs if omitted.
            schema:
              type: string

        options:
          - name: config
            aliases: [c]
            description: Path to config file.
            value_name: path
            schema:
              type: string
            file:
              mode: read
              exists: true
              encoding: utf-8

          - name: adapter
            aliases: [a]
            description: SDK adapter to use for LLM execution.
            value_name: name
            schema:
              type: string
              enum: [cursor, claude, openai, gemini, mock]

          - name: model
            description: LLM model override.
            value_name: name
            schema:
              type: string

          - name: fail-on
            description: Minimum severity that causes a non-zero exit.
            value_name: level
            schema:
              type: string
              enum: [warning, error, critical]
              default: error

          - name: output
            aliases: [o]
            description: Write result to a file instead of stdout.
            value_name: file
            schema:
              type: string
            file:
              mode: write
              encoding: utf-8

          - name: report-format
            description: Output format for the report.
            value_name: fmt
            schema:
              type: string
              enum: [json, text, yaml]
              default: json

          - name: log-file
            aliases: [l]
            description: Write agent progress log to this file path.
            schema:
              type: string

          - name: show-prompt
            description: Output the constructed prompt without calling the LLM API.
            schema:
              type: boolean
              default: false

        exits:
          '0':
            description: Proposal completed, no blocking findings.
            stdout:
              format: '{options.report-format}'
              schema:
                $ref: '#/components/schemas/AcceptanceCriteriaResult'

          '1':
            description: Unexpected error.
            stderr:
              format: text

          '2':
            description: Configuration or input error.
            stderr:
              format: text

          '10':
            description: Completed with blocking findings.
            stdout:
              format: '{options.report-format}'
              schema:
                $ref: '#/components/schemas/AcceptanceCriteriaResult'

          '11':
            description: Runtime dependency missing (agent-contracts-runtime).
            stderr:
              format: text

          '12':
            description: LLM provider or adapter error.
            stderr:
              format: text

        x-agent:
          dsl_task: propose-acceptance-criteria
          safeDryRunOption: show-prompt
          sideEffectNote: >-
            Makes network calls to the configured LLM provider when adapter is
            not mock. Filesystem write only when --output is specified.
          expectedDurationMs: 120000
          recommended_before_use:
            - "Run with --show-prompt first to preview the prompt"
          retryableExitCodes: [1, 12]

      # ── agents ──────────────────────────────────────────
      agents:
        summary: Output the full resolved agent DSL as structured data.
        description: >-
          Outputs the complete resolved agent-contracts DSL (agents, tasks,
          workflows, handoff_types) embedded in this CLI binary.
          Useful for debugging, external tooling integration, and DSL
          inspection.
        options:
          - name: format
            aliases: [F]
            description: Output format.
            schema:
              type: string
              enum: [yaml, json]
              default: yaml

        exits:
          '0':
            description: DSL output successfully.
            stdout:
              format: text
          '1':
            description: Failed to load embedded DSL.
            stderr:
              format: text

        x-agent:
          riskLevel: low
          requiresConfirmation: false
          idempotent: true
          sideEffects: []

components:
  schemas:
    AgentEvidence:
      $ref: 'components.yaml#/schemas/agent-evidence'
    AgentFinding:
      $ref: 'components.yaml#/schemas/agent-finding'
    AgentRecommendedAction:
      $ref: 'components.yaml#/schemas/agent-recommended-action'
    RequirementAuditResult:
      $ref: 'components.yaml#/schemas/agent-audit-result'

    TraceLinkResult:
      type: object
      description: Result of trace link proposal with candidate links.
      allOf:
        - $ref: 'components.yaml#/schemas/agent-audit-result'
        - type: object
          required: [candidateLinks]
          properties:
            candidateLinks:
              type: array
              items:
                type: object
                required: [from, relation, to, confidence, reason]
                properties:
                  from:
                    type: string
                  relation:
                    type: string
                  to:
                    type: string
                  confidence:
                    type: number
                    minimum: 0
                    maximum: 1
                  reason:
                    type: string

    ImpactExplainResult:
      type: object
      description: Human-readable explanation of impact analysis output.
      allOf:
        - $ref: 'components.yaml#/schemas/agent-audit-result'
        - type: object
          required: [explanation]
          properties:
            explanation:
              type: string
            affectedArtifacts:
              type: array
              items:
                type: object
                required: [type, id, summary]
                properties:
                  type:
                    type: string
                    enum: [spec, api, ddl, test, annotation]
                  id:
                    type: string
                  summary:
                    type: string
            testConsiderations:
              type: array
              items:
                type: string
            releaseRisk:
              type: string
              enum: [low, medium, high]
            sourceCommand:
              type: string

    AcceptanceCriteriaResult:
      type: object
      description: Proposed acceptance criteria for design specs.
      allOf:
        - $ref: 'components.yaml#/schemas/agent-audit-result'
        - type: object
          required: [criteriaProposals]
          properties:
            criteriaProposals:
              type: array
              items:
                type: object
                required: [specId, criteria, rationale]
                properties:
                  specId:
                    type: string
                  criteria:
                    type: array
                    items:
                      type: string
                  rationale:
                    type: string

    ImpactAnalysisOutput:
      type: object
      description: >-
        JSON output from speckeeper impact --format json.
      required: [target, targetType, impactedNodes]
      properties:
        target:
          type: string
        targetType:
          type: string
        direction:
          type: string
          enum: [upstream, downstream, both]
        depth:
          type: integer
        impactedNodes:
          type: array
          items:
            type: object
            required: [id, type, depth, impactType]
            properties:
              id:
                type: string
              type:
                type: string
              depth:
                type: integer
              impactType:
                type: string
                enum: [direct, indirect]
              relations:
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                    from:
                      type: string
                    to:
                      type: string
