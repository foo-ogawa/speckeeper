# yaml-language-server: $schema=./node_modules/cli-contracts/schemas/cli-contract.schema.json
cliContracts: 0.1.0

info:
  title: speckeeper CLI
  version: 0.10.0
  description: >-
    TypeScript-first specification validation framework — validate design
    consistency, external SSOT integrity, and traceability with type-safe
    TypeScript DSL. Supports design lint, external source checks (OpenAPI,
    DDL, annotations), drift detection, impact analysis, and scaffolding
    from Mermaid flowcharts.
  license:
    name: MIT

commandSets:
  speckeeper:
    summary: Requirements and design management framework with TypeScript DSL.
    executable: speckeeper

    globalOptions:
      - name: version
        aliases: [V]
        description: Print version and exit.
        schema:
          type: boolean

      - name: help
        aliases: [h]
        description: Show help and exit.
        schema:
          type: boolean

    commands:
      # ── init ──────────────────────────────────────────
      init:
        summary: Initialize a new speckeeper project with starter templates.
        description: >-
          Copies starter template files (speckeeper.config.ts, design/
          directory structure) into the current project. Provides a minimal
          working setup with generic models and example specs.
        usage:
          - speckeeper init
          - speckeeper init --force

        options:
          - name: force
            aliases: [F]
            description: Overwrite existing files.
            schema:
              type: boolean
              default: false

        exits:
          '0':
            description: Project initialized successfully.
            stdout:
              format: text

          '1':
            description: Initialization failed (files already exist without --force).
            stderr:
              format: text

        x-agent:
          riskLevel: medium
          requiresConfirmation: true
          idempotent: false
          sideEffects:
            - file_write
          sideEffectNote: >-
            Creates config file and design/ directory structure.
            With --force, overwrites existing files.

      # ── build ─────────────────────────────────────────
      build:
        summary: Generate docs/ and specs/ from TypeScript models.
        description: >-
          Loads the design TypeScript models and generates machine-readable
          specs/ output and optionally human-readable docs/ output. Supports
          markdown, JSON, or both formats. Can watch for file changes and
          auto-regenerate.
        usage:
          - speckeeper build
          - speckeeper build --format json --output ./out
          - speckeeper build --watch --verbose

        options:
          - name: config
            aliases: [c]
            description: Path to config file.
            valueName: path
            schema:
              type: string
            file:
              mode: read
              exists: true
              encoding: utf-8

          - name: output
            aliases: [o]
            description: Base output directory path.
            valueName: path
            schema:
              type: string
              default: "."

          - name: format
            aliases: [f]
            description: "Output format: markdown, json, both."
            valueName: format
            schema:
              type: string
              default: both
              enum: [markdown, json, both]

          - name: watch
            aliases: [w]
            description: Watch for changes and auto-regenerate.
            schema:
              type: boolean
              default: false

          - name: verbose
            aliases: [v]
            description: Show detailed output.
            schema:
              type: boolean
              default: false

        exits:
          '0':
            description: Build completed successfully.
            stdout:
              format: text

          '1':
            description: Build failed (config error, model loading error, or generation error).
            stderr:
              format: text

        x-agent:
          riskLevel: low
          requiresConfirmation: false
          idempotent: true
          sideEffects:
            - file_write
          sideEffectNote: >-
            When --watch is used, the process runs indefinitely and is
            unsuitable for non-interactive agent invocation.
            Always writes generated files to docs/ and specs/.

      # ── lint ──────────────────────────────────────────
      lint:
        summary: Check design integrity (ID duplicates, references, layer violations, etc.).
        description: >-
          Validates design models for structural integrity. Checks include
          ID uniqueness, ID naming conventions, reference integrity, circular
          dependency detection, phase gate enforcement, and custom model-specific
          lint rules. Optionally auto-fixes issues.
        usage:
          - speckeeper lint
          - speckeeper lint --strict --format github
          - speckeeper lint --phase HLD --fix

        options:
          - name: config
            aliases: [c]
            description: Path to config file.
            valueName: path
            schema:
              type: string
            file:
              mode: read
              exists: true
              encoding: utf-8

          - name: phase
            aliases: [p]
            description: "Phase gate to check against: REQ, HLD, LLD, OPS."
            valueName: phase
            schema:
              type: string
              enum: [REQ, HLD, LLD, OPS]

          - name: strict
            aliases: [s]
            description: Treat warnings as errors.
            schema:
              type: boolean
              default: false

          - name: fix
            description: Attempt to fix auto-fixable issues.
            schema:
              type: boolean
              default: false

          - name: format
            aliases: [f]
            description: "Output format: text, json, github."
            valueName: format
            schema:
              type: string
              default: text
              enum: [text, json, github]

        exits:
          '0':
            description: No lint issues found (or all issues auto-fixed).
            stdout:
              format: '{options.format}'

          '1':
            description: Lint issues found (errors or warnings with --strict).
            stdout:
              format: '{options.format}'

        x-agent:
          riskLevel: low
          requiresConfirmation: false
          idempotent: true
          sideEffects:
            - file_write
          sideEffectNote: >-
            file_write applies only when --fix is provided.
            Without --fix the command is read-only.
          safeDryRunOption: Omit --fix to run in read-only mode.

      # ── drift ─────────────────────────────────────────
      drift:
        summary: Check if generated files have been manually edited.
        description: >-
          Compares generated files against their expected content to detect
          manual edits (drift). Useful for CI pipelines to ensure generated
          docs/ files stay in sync with model definitions. Can auto-update
          drifted files.
        usage:
          - speckeeper drift
          - speckeeper drift --fail-on-drift
          - speckeeper drift --update --format diff

        options:
          - name: config
            aliases: [c]
            description: Path to config file.
            valueName: path
            schema:
              type: string
            file:
              mode: read
              exists: true
              encoding: utf-8

          - name: update
            aliases: [u]
            description: Auto-update if differences are found.
            schema:
              type: boolean
              default: false

          - name: format
            aliases: [f]
            description: "Output format: text, json, diff."
            valueName: format
            schema:
              type: string
              default: text
              enum: [text, json, diff]

          - name: fail-on-drift
            description: Exit with code 1 if drift is detected (for CI).
            schema:
              type: boolean
              default: false

        exits:
          '0':
            description: No drift detected (or drift auto-updated with --update).
            stdout:
              format: '{options.format}'

          '1':
            description: Drift detected (with --fail-on-drift), or update failed.
            stdout:
              format: '{options.format}'

        x-agent:
          riskLevel: medium
          requiresConfirmation: true
          idempotent: true
          sideEffects:
            - file_write
          sideEffectNote: >-
            file_write applies only when --update is provided.
            Without --update the command is read-only.
          safeDryRunOption: Omit --update to run in read-only mode.

      # ── check ─────────────────────────────────────────
      check:
        summary: Check external SSOT conformance (including custom models).
        description: >-
          Validates specifications against actual implementation artifacts
          using a global source scan. Performs existence checks (is the spec
          ID found in configured sources?), optional structural checks (via
          deep validation), and optional type checks. Sources include OpenAPI,
          DDL, annotations, and custom scanners. Supports filtering by check
          type and test coverage reporting.
        usage:
          - speckeeper check
          - speckeeper check external-ssot --verbose
          - speckeeper check test --coverage
          - speckeeper check openapi --strict

        arguments:
          - name: type
            index: 0
            required: false
            description: >-
              Type of check to run. Filters sources by type. When omitted,
              checks all configured sources.
            schema:
              type: string
              enum: [external-ssot, openapi, ddl, iac, custom, all, test]

        options:
          - name: config
            aliases: [c]
            description: Path to config file.
            valueName: path
            schema:
              type: string
            file:
              mode: read
              exists: true
              encoding: utf-8

          - name: strict
            description: Treat warnings as errors.
            schema:
              type: boolean
              default: false

          - name: verbose
            aliases: [v]
            description: Show detailed output (e.g. list unmatched specs).
            schema:
              type: boolean
              default: false

          - name: coverage
            description: Check if all testable acceptance criteria are covered by TestRefs.
            schema:
              type: boolean
              default: false

          - name: format
            aliases: [f]
            description: "Output format: text, json, github."
            valueName: format
            schema:
              type: string
              default: text
              enum: [text, json, github]

        exits:
          '0':
            description: All checks passed (all specs found in sources, deep validation passed).
            stdout:
              format: '{options.format}'

          '1':
            description: Check failures found (missing specs, structural mismatches, or coverage gaps).
            stdout:
              format: '{options.format}'

        x-agent:
          riskLevel: low
          requiresConfirmation: false
          idempotent: true
          sideEffects: []

      # ── new ───────────────────────────────────────────
      new:
        summary: Create a new element with auto-generated ID.
        description: >-
          Generates a new design element file with a unique auto-generated ID
          based on the model's ID prefix and existing elements. Supports all
          built-in model types and uses templates for file generation.
        usage:
          - speckeeper new requirement --name "User Authentication"
          - speckeeper new entity --kind functional
          - speckeeper new usecase --template custom-template.ts

        arguments:
          - name: type
            index: 0
            required: true
            description: >-
              Element type to create: requirement, usecase, entity, component,
              screen, flow, error-case, term.
            schema:
              type: string
              enum: [requirement, usecase, entity, component, screen, flow, error-case, term]

        options:
          - name: kind
            aliases: [k]
            description: Sub-kind (e.g. functional, non-functional for requirements).
            valueName: kind
            schema:
              type: string

          - name: name
            aliases: [n]
            description: Name of the element.
            valueName: name
            schema:
              type: string

          - name: output
            aliases: [o]
            description: Output directory path.
            valueName: path
            schema:
              type: string

          - name: template
            aliases: [t]
            description: Path to template file.
            valueName: path
            schema:
              type: string
            file:
              mode: read
              exists: true
              encoding: utf-8

          - name: dry-run
            description: Preview generated file content and ID without writing to disk.
            schema:
              type: boolean
              default: false

        exits:
          '0':
            description: Element file created (or previewed with --dry-run) with auto-generated ID.
            stdout:
              format: text

          '1':
            description: Creation failed (invalid type, template error, or write error).
            stderr:
              format: text

        x-agent:
          riskLevel: low
          requiresConfirmation: false
          idempotent: false
          sideEffects:
            - file_write
          sideEffectNote: >-
            Creates a new TypeScript spec file with auto-generated ID.
            With --dry-run, only previews the generated content without writing.
          safeDryRunOption: --dry-run

      # ── impact ────────────────────────────────────────
      impact:
        summary: Analyze impact of changes to an ID.
        description: >-
          Performs change impact analysis by traversing the relation graph
          starting from the specified spec ID. Shows upstream (dependants)
          and/or downstream (dependencies) elements up to the configured
          depth. Supports text, JSON, and Mermaid diagram output.
        usage:
          - speckeeper impact FR-001
          - speckeeper impact ENT-ORDER --direction upstream --depth 5
          - speckeeper impact COMP-AUTH --format mermaid

        arguments:
          - name: id
            index: 0
            required: true
            description: "Spec ID to analyze (e.g. REQ-001, ENT-ORDER, COMP-AUTH)."
            schema:
              type: string

        options:
          - name: config
            aliases: [c]
            description: Path to config file.
            valueName: path
            schema:
              type: string
            file:
              mode: read
              exists: true
              encoding: utf-8

          - name: depth
            aliases: [d]
            description: Analysis depth (reference tracking level).
            valueName: n
            schema:
              type: integer
              minimum: 1
              default: 3

          - name: direction
            description: "Analysis direction: upstream, downstream, both."
            valueName: direction
            schema:
              type: string
              default: both
              enum: [upstream, downstream, both]

          - name: format
            aliases: [f]
            description: "Output format: text, json, mermaid."
            valueName: format
            schema:
              type: string
              default: text
              enum: [text, json, mermaid]

        exits:
          '0':
            description: Impact analysis completed and displayed.
            stdout:
              format: '{options.format}'

          '1':
            description: Analysis failed (ID not found or config error).
            stderr:
              format: text

        x-agent:
          riskLevel: low
          requiresConfirmation: false
          idempotent: true
          sideEffects: []

      # ── scaffold ──────────────────────────────────────
      scaffold:
        summary: Generate _models/ from a Mermaid flowchart definition.
        description: >-
          Parses a Mermaid flowchart from a Markdown file and generates
          TypeScript model classes, spec data files, and an index file in
          the design directory. Uses class-based artifact resolution to
          determine model types from Mermaid node classes.
        usage:
          - speckeeper scaffold --source requirements.md
          - speckeeper scaffold --source flow.md --output design/ --force
          - speckeeper scaffold --source arch.md --dry-run

        options:
          - name: source
            aliases: [s]
            description: Path to Markdown file containing Mermaid flowchart.
            valueName: path
            required: true
            schema:
              type: string
            file:
              mode: read
              exists: true
              encoding: utf-8

          - name: output
            aliases: [o]
            description: Output directory.
            valueName: path
            schema:
              type: string
              default: design/

          - name: force
            aliases: [F]
            description: Overwrite existing files.
            schema:
              type: boolean
              default: false

          - name: dry-run
            description: Preview generated files without writing.
            schema:
              type: boolean
              default: false

        exits:
          '0':
            description: >-
              Model files generated (or previewed with --dry-run) successfully.
            stdout:
              format: text

          '1':
            description: >-
              Scaffold failed (source file not found, invalid Mermaid syntax,
              or write error).
            stderr:
              format: text

        x-agent:
          riskLevel: high
          requiresConfirmation: true
          idempotent: false
          sideEffects:
            - file_write
          sideEffectNote: >-
            --force overwrites existing TypeScript model source files.
          safeDryRunOption: --dry-run

      # ── audit-requirements ──────────────────────────────
      audit-requirements:
        summary: Run LLM-based requirement quality audit.
        description: >-
          Performs semantic analysis of design specs using LLM to identify
          quality issues that static lint cannot detect. Evaluates verifiability,
          ambiguity, granularity, terminology consistency, and design-mixing.
          Requires agent-contracts-runtime as an optional peer dependency.
        usage:
          - speckeeper audit-requirements
          - speckeeper audit-requirements --adapter gemini --dry-run
          - speckeeper audit-requirements --report-format json --output audit.json

        options:
          - name: config
            aliases: [c]
            description: Path to config file.
            valueName: path
            schema:
              type: string
            file:
              mode: read
              exists: true
              encoding: utf-8

          - name: adapter
            aliases: [a]
            description: SDK adapter to use for LLM execution.
            valueName: name
            schema:
              type: string
              enum: [cursor, claude, openai, gemini, mock]

          - name: model
            description: LLM model override.
            valueName: name
            schema:
              type: string

          - name: dry-run
            aliases: [n]
            description: Output the constructed prompt without calling LLM.
            schema:
              type: boolean
              default: false

          - name: show-prompt
            description: Display the constructed LLM prompt on stderr.
            schema:
              type: boolean
              default: false

          - name: fail-on
            description: Minimum severity that causes a non-zero exit.
            valueName: level
            schema:
              type: string
              enum: [warning, error, critical]
              default: error

          - name: output
            aliases: [o]
            description: Write result to a file instead of stdout.
            valueName: file
            schema:
              type: string
            file:
              mode: write
              encoding: utf-8

          - name: report-format
            description: Output format for the audit report.
            valueName: fmt
            schema:
              type: string
              enum: [json, text, yaml]
              default: json

        exits:
          '0':
            description: Audit completed, no blocking findings.
            stdout:
              format: '{options.report-format}'
              schema:
                $ref: '#/components/schemas/RequirementAuditResult'

          '1':
            description: Unexpected error.
            stderr:
              format: text

          '2':
            description: Configuration or input error.
            stderr:
              format: text

          '10':
            description: Completed with blocking findings.
            stdout:
              format: '{options.report-format}'
              schema:
                $ref: '#/components/schemas/RequirementAuditResult'

          '11':
            description: Runtime dependency missing (agent-contracts-runtime).
            stderr:
              format: text

          '12':
            description: LLM provider or adapter error.
            stderr:
              format: text

        x-agent:
          riskLevel: medium
          requiresConfirmation: false
          idempotent: true
          sideEffects: [network, file_write]
          sideEffectNote: >-
            Network calls to LLM provider when adapter is not mock.
            Filesystem write when --output is specified.
            Exit 10 = valid output with blocking findings (stdout contains result).
            Exit 11 = missing runtime dependency (non-retryable).
          safeDryRunOption: --dry-run
          expectedDurationMs: 120000
          retryableExitCodes: [12]

      # ── propose-trace-links ─────────────────────────────
      propose-trace-links:
        summary: LLM-based traceability link proposal.
        description: >-
          Analyzes spec definitions and external source scan results to
          propose candidate traceability links between specs and
          implementation artifacts. Each link includes a confidence score
          and rationale.
        usage:
          - speckeeper propose-trace-links
          - speckeeper propose-trace-links --adapter claude --report-format json
          - speckeeper propose-trace-links --dry-run

        options:
          - name: config
            aliases: [c]
            description: Path to config file.
            valueName: path
            schema:
              type: string
            file:
              mode: read
              exists: true
              encoding: utf-8

          - name: adapter
            aliases: [a]
            description: SDK adapter to use for LLM execution.
            valueName: name
            schema:
              type: string
              enum: [cursor, claude, openai, gemini, mock]

          - name: model
            description: LLM model override.
            valueName: name
            schema:
              type: string

          - name: dry-run
            aliases: [n]
            description: Output the constructed prompt without calling LLM.
            schema:
              type: boolean
              default: false

          - name: show-prompt
            description: Display the constructed LLM prompt on stderr.
            schema:
              type: boolean
              default: false

          - name: fail-on
            description: Minimum severity that causes a non-zero exit.
            valueName: level
            schema:
              type: string
              enum: [warning, error, critical]
              default: error

          - name: output
            aliases: [o]
            description: Write result to a file instead of stdout.
            valueName: file
            schema:
              type: string
            file:
              mode: write
              encoding: utf-8

          - name: report-format
            description: Output format for the report.
            valueName: fmt
            schema:
              type: string
              enum: [json, text, yaml]
              default: json

        exits:
          '0':
            description: Proposal completed, no blocking findings.
            stdout:
              format: '{options.report-format}'
              schema:
                $ref: '#/components/schemas/TraceLinkResult'

          '1':
            description: Unexpected error.
            stderr:
              format: text

          '2':
            description: Configuration or input error.
            stderr:
              format: text

          '10':
            description: Completed with blocking findings.
            stdout:
              format: '{options.report-format}'
              schema:
                $ref: '#/components/schemas/TraceLinkResult'

          '11':
            description: Runtime dependency missing (agent-contracts-runtime).
            stderr:
              format: text

          '12':
            description: LLM provider or adapter error.
            stderr:
              format: text

        x-agent:
          riskLevel: medium
          requiresConfirmation: false
          idempotent: true
          sideEffects: [network, file_write]
          sideEffectNote: >-
            Network calls to LLM provider when adapter is not mock.
            Filesystem write when --output is specified.
            Exit 10 = valid output with blocking findings (stdout contains result).
            Exit 11 = missing runtime dependency (non-retryable).
          safeDryRunOption: --dry-run
          expectedDurationMs: 120000
          retryableExitCodes: [12]

      # ── explain-impact ──────────────────────────────────
      explain-impact:
        summary: LLM-based explanation of impact analysis output.
        description: >-
          Reads JSON output from speckeeper impact on stdin and generates
          a human-readable explanation suitable for PM/executive audiences.
          Includes affected artifact categorization, test considerations,
          and release risk assessment.
        usage:
          - speckeeper impact FR-001 --format json | speckeeper explain-impact
          - speckeeper impact ENT-ORDER --format json | speckeeper explain-impact --adapter claude

        stdin:
          required: true
          format: json
          description: >-
            JSON output from speckeeper impact --format json.
            Must contain target, targetType, and impactedNodes fields.
          schema:
            $ref: '#/components/schemas/ImpactAnalysisOutput'

        options:
          - name: config
            aliases: [c]
            description: Path to config file.
            valueName: path
            schema:
              type: string
            file:
              mode: read
              exists: true
              encoding: utf-8

          - name: adapter
            aliases: [a]
            description: SDK adapter to use for LLM execution.
            valueName: name
            schema:
              type: string
              enum: [cursor, claude, openai, gemini, mock]

          - name: model
            description: LLM model override.
            valueName: name
            schema:
              type: string

          - name: dry-run
            aliases: [n]
            description: Output the constructed prompt without calling LLM.
            schema:
              type: boolean
              default: false

          - name: show-prompt
            description: Display the constructed LLM prompt on stderr.
            schema:
              type: boolean
              default: false

          - name: fail-on
            description: Minimum severity that causes a non-zero exit.
            valueName: level
            schema:
              type: string
              enum: [warning, error, critical]
              default: error

          - name: output
            aliases: [o]
            description: Write result to a file instead of stdout.
            valueName: file
            schema:
              type: string
            file:
              mode: write
              encoding: utf-8

          - name: report-format
            description: Output format for the report.
            valueName: fmt
            schema:
              type: string
              enum: [json, text, yaml]
              default: json

        exits:
          '0':
            description: Explanation completed successfully.
            stdout:
              format: '{options.report-format}'
              schema:
                $ref: '#/components/schemas/ImpactExplainResult'

          '1':
            description: Unexpected error.
            stderr:
              format: text

          '2':
            description: Configuration or input error.
            stderr:
              format: text

          '3':
            description: No input on stdin.
            stderr:
              format: text

          '10':
            description: Completed with blocking findings.
            stdout:
              format: '{options.report-format}'
              schema:
                $ref: '#/components/schemas/ImpactExplainResult'

          '11':
            description: Runtime dependency missing (agent-contracts-runtime).
            stderr:
              format: text

          '12':
            description: LLM provider or adapter error.
            stderr:
              format: text

        x-agent:
          riskLevel: medium
          requiresConfirmation: false
          idempotent: true
          sideEffects: [network, file_write]
          sideEffectNote: >-
            Network calls to LLM provider when adapter is not mock.
            Filesystem write when --output is specified.
            Exit 10 = valid output with blocking findings (stdout contains result).
            Exit 11 = missing runtime dependency (non-retryable).
          safeDryRunOption: --dry-run
          expectedDurationMs: 120000
          retryableExitCodes: [12]

      # ── propose-acceptance-criteria ─────────────────────
      propose-acceptance-criteria:
        summary: LLM-based acceptance criteria proposal.
        description: >-
          Analyzes design specs and proposes testable acceptance criteria
          for each target spec. Optionally takes spec IDs as arguments to
          scope the proposal. Criteria are proposed in Given/When/Then or
          verification format.
        usage:
          - speckeeper propose-acceptance-criteria
          - speckeeper propose-acceptance-criteria FR-001 FR-002
          - speckeeper propose-acceptance-criteria --adapter gemini --dry-run

        arguments:
          - name: specIds
            index: 0
            required: false
            variadic: true
            description: >-
              Spec IDs to propose criteria for.
              Defaults to all specs if omitted.
            schema:
              type: string

        options:
          - name: config
            aliases: [c]
            description: Path to config file.
            valueName: path
            schema:
              type: string
            file:
              mode: read
              exists: true
              encoding: utf-8

          - name: adapter
            aliases: [a]
            description: SDK adapter to use for LLM execution.
            valueName: name
            schema:
              type: string
              enum: [cursor, claude, openai, gemini, mock]

          - name: model
            description: LLM model override.
            valueName: name
            schema:
              type: string

          - name: dry-run
            aliases: [n]
            description: Output the constructed prompt without calling LLM.
            schema:
              type: boolean
              default: false

          - name: show-prompt
            description: Display the constructed LLM prompt on stderr.
            schema:
              type: boolean
              default: false

          - name: fail-on
            description: Minimum severity that causes a non-zero exit.
            valueName: level
            schema:
              type: string
              enum: [warning, error, critical]
              default: error

          - name: output
            aliases: [o]
            description: Write result to a file instead of stdout.
            valueName: file
            schema:
              type: string
            file:
              mode: write
              encoding: utf-8

          - name: report-format
            description: Output format for the report.
            valueName: fmt
            schema:
              type: string
              enum: [json, text, yaml]
              default: json

        exits:
          '0':
            description: Proposal completed, no blocking findings.
            stdout:
              format: '{options.report-format}'
              schema:
                $ref: '#/components/schemas/AcceptanceCriteriaResult'

          '1':
            description: Unexpected error.
            stderr:
              format: text

          '2':
            description: Configuration or input error.
            stderr:
              format: text

          '10':
            description: Completed with blocking findings.
            stdout:
              format: '{options.report-format}'
              schema:
                $ref: '#/components/schemas/AcceptanceCriteriaResult'

          '11':
            description: Runtime dependency missing (agent-contracts-runtime).
            stderr:
              format: text

          '12':
            description: LLM provider or adapter error.
            stderr:
              format: text

        x-agent:
          riskLevel: medium
          requiresConfirmation: false
          idempotent: true
          sideEffects: [network, file_write]
          sideEffectNote: >-
            Network calls to LLM provider when adapter is not mock.
            Filesystem write when --output is specified.
            Exit 10 = valid output with blocking findings (stdout contains result).
            Exit 11 = missing runtime dependency (non-retryable).
          safeDryRunOption: --dry-run
          expectedDurationMs: 120000
          retryableExitCodes: [12]

components:
  schemas:
    # ── AI Agent Interoperability Schemas ──────────────────
    AgentEvidence:
      $ref: 'components.yaml#/schemas/agent-evidence'
    AgentFinding:
      $ref: 'components.yaml#/schemas/agent-finding'
    AgentRecommendedAction:
      $ref: 'components.yaml#/schemas/agent-recommended-action'
    RequirementAuditResult:
      $ref: 'components.yaml#/schemas/agent-audit-result'

    TraceLinkResult:
      type: object
      description: Result of trace link proposal with candidate links.
      allOf:
        - $ref: 'components.yaml#/schemas/agent-audit-result'
        - type: object
          required: [candidateLinks]
          properties:
            candidateLinks:
              type: array
              items:
                type: object
                required: [from, relation, to, confidence, reason]
                properties:
                  from:
                    type: string
                    description: Source spec ID.
                  relation:
                    type: string
                    description: Relation type (implements, verifiedBy, satisfies, etc.).
                  to:
                    type: string
                    description: Target ID.
                  confidence:
                    type: number
                    minimum: 0
                    maximum: 1
                  reason:
                    type: string

    ImpactExplainResult:
      type: object
      description: Human-readable explanation of impact analysis output.
      allOf:
        - $ref: 'components.yaml#/schemas/agent-audit-result'
        - type: object
          required: [explanation]
          properties:
            explanation:
              type: string
              description: Multi-paragraph human-readable explanation in Markdown format.
            affectedArtifacts:
              type: array
              items:
                type: object
                required: [type, id, summary]
                properties:
                  type:
                    type: string
                    enum: [spec, api, ddl, test, annotation]
                  id:
                    type: string
                  summary:
                    type: string
            testConsiderations:
              type: array
              items:
                type: string
            releaseRisk:
              type: string
              enum: [low, medium, high]
            sourceCommand:
              type: string

    AcceptanceCriteriaResult:
      type: object
      description: Proposed acceptance criteria for design specs.
      allOf:
        - $ref: 'components.yaml#/schemas/agent-audit-result'
        - type: object
          required: [criteriaProposals]
          properties:
            criteriaProposals:
              type: array
              items:
                type: object
                required: [specId, criteria, rationale]
                properties:
                  specId:
                    type: string
                  criteria:
                    type: array
                    items:
                      type: string
                  rationale:
                    type: string

    ImpactAnalysisOutput:
      type: object
      description: >-
        JSON output from speckeeper impact --format json.
        Used as stdin input for explain-impact command.
      required: [target, targetType, impactedNodes]
      properties:
        target:
          type: string
          description: The spec ID that was analyzed.
        targetType:
          type: string
          description: Type of the target spec (requirement, usecase, entity, etc.).
        direction:
          type: string
          enum: [upstream, downstream, both]
        depth:
          type: integer
        impactedNodes:
          type: array
          items:
            type: object
            required: [id, type, depth, impactType]
            properties:
              id:
                type: string
              type:
                type: string
              depth:
                type: integer
              impactType:
                type: string
                enum: [direct, indirect]
              relations:
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                    from:
                      type: string
                    to:
                      type: string
