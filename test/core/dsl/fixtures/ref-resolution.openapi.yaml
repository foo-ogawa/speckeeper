openapi: "3.0.0"
info:
  title: Ref Resolution Test API
  version: "1.0.0"
paths:
  /items/{id}:
    get:
      operationId: getItem
      summary: Get an item by ID
      parameters:
        - $ref: "#/components/parameters/ItemId"
      responses:
        "200":
          description: A single item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
components:
  parameters:
    ItemId:
      name: id
      in: path
      required: true
      schema:
        type: string
  schemas:
    Item:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        price:
          type: number
