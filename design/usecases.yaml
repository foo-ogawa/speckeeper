entries:
  - model: actor
    specs:
      - id: UC-ACTOR-001
        name: Requirements Engineer
        type: human
        description: PO/PM/Business representative. Defines requirements and acceptance criteria in TS models and generates
          documentation
      - id: UC-ACTOR-002
        name: Design Engineer
        type: human
        description: Architect/Development lead. Defines logical architecture and concept models in TS models and generates
          C4/ER diagrams
      - id: UC-ACTOR-003
        name: Implementation Engineer
        type: human
        description: App/Infrastructure developer. Defines screen specifications and process flows, checks consistency with
          external SSOT
      - id: UC-ACTOR-004
        name: Operations Engineer
        type: human
        description: SRE/Operations staff. Manages observability requirements, Runbook and monitoring configuration consistency
      - id: UC-ACTOR-005
        name: Reviewer
        type: human
        description: Quality/Security staff. Performs design reviews and verifies consistency check results
      - id: UC-ACTOR-SYS-001
        name: CI/CD System
        type: system
        description: System that automatically executes lint/drift/check commands
  - model: usecase
    specs:
      - id: UC-001
        name: Define Requirements
        description: Requirements engineer defines requirements using TypeScript DSL
        actor: UC-ACTOR-001
        phase: REQ
        preconditions:
          - speckeeper is installed
          - design/ directory exists in the project
        postconditions:
          - Requirements list Markdown has been generated
          - Lint has verified requirement consistency, required fields, and reference integrity
        relatedRequirements:
          - FR-100
          - FR-101
          - FR-104
        mainFlow:
          - stepNumber: 1
            type: user_action
            description: Requirements engineer creates or edits design/requirements.ts
          - stepNumber: 2
            type: system_response
            description: IDE displays type completion and validation errors
          - stepNumber: 3
            type: user_action
            description: Define requirements using DSL
          - stepNumber: 4
            type: system_response
            description: DSL builder validates input
          - stepNumber: 5
            type: user_action
            description: Run speckeeper build
          - stepNumber: 6
            type: system_response
            description: Markdown is generated in docs/requirements/
          - stepNumber: 7
            type: user_action
            description: Run speckeeper lint
          - stepNumber: 8
            type: system_response
            description: Requirement consistency is verified
        relations:
          - type: traces
            target: FR-100
            description: Related to common requirements
          - type: traces
            target: FR-104
            description: Related to model definition requirement
      - id: UC-002
        name: Define Architecture
        description: Design engineer defines components, boundaries, and layers
        actor: UC-ACTOR-002
        phase: HLD
        preconditions:
          - speckeeper is installed
          - REQ phase is complete
        postconditions:
          - C4 diagram has been generated
          - Lint has verified architecture consistency
        relatedRequirements:
          - FR-104
          - FR-300
          - FR-500
        mainFlow:
          - stepNumber: 1
            type: user_action
            description: Create or edit design/architecture.ts
          - stepNumber: 2
            type: system_response
            description: IDE displays type completion
          - stepNumber: 3
            type: user_action
            description: Define components and relationships
          - stepNumber: 4
            type: system_response
            description: DSL builder validates input
          - stepNumber: 5
            type: user_action
            description: Run speckeeper build
          - stepNumber: 6
            type: system_response
            description: Mermaid C4 diagram is generated in docs/architecture/
          - stepNumber: 7
            type: user_action
            description: Run speckeeper lint
          - stepNumber: 8
            type: system_response
            description: Layer violations, boundary crossings, etc. are verified
        relations:
          - type: traces
            target: FR-104
            description: Related to model definition requirement
          - type: traces
            target: FR-300
            description: Related to build command requirement
          - type: traces
            target: FR-500
            description: Related to lint requirement
      - id: UC-004
        name: Define Concept Model
        description: Design engineer defines entities, relations, and business rules
        actor: UC-ACTOR-002
        phase: LLD
        preconditions:
          - speckeeper is installed
          - HLD phase is complete
        postconditions:
          - ER diagram has been generated
          - Common vocabulary JSON has been generated
        relatedRequirements:
          - FR-104
          - FR-302
        mainFlow:
          - stepNumber: 1
            type: user_action
            description: Create or edit design/concept-model.ts
          - stepNumber: 2
            type: system_response
            description: IDE displays type completion
          - stepNumber: 3
            type: user_action
            description: Define entities and relations
          - stepNumber: 4
            type: user_action
            description: Run speckeeper build
          - stepNumber: 5
            type: system_response
            description: Mermaid ER diagram is generated in docs/data-model/
          - stepNumber: 6
            type: system_response
            description: Common vocabulary JSON is generated in specs/schemas/
      - id: UC-006
        name: Check External SSOT Consistency
        description: Implementation engineer verifies consistency between TS models and external SSOT (OpenAPI/DDL)
        actor: UC-ACTOR-003
        phase: IMPL
        preconditions:
          - speckeeper is installed
          - APIRef/TableRef are defined
          - Corresponding external SSOT files exist
        postconditions:
          - Consistency errors are reported if any
        relatedRequirements:
          - FR-200
          - FR-600
        mainFlow:
          - stepNumber: 1
            type: user_action
            description: Run speckeeper check external-ssot
          - stepNumber: 2
            type: system_response
            description: Load OpenAPI/DDL files
          - stepNumber: 3
            type: system_response
            description: Verify requirement-external SSOT consistency
          - stepNumber: 4
            type: system_response
            description: Display verification results
        relations:
          - type: traces
            target: FR-600
            description: Related to check command requirement
          - type: traces
            target: FR-200
            description: Related to external SSOT reference requirement
      - id: UC-010
        name: Check Design Consistency
        description: CI/CD system verifies model consistency
        actor: UC-ACTOR-SYS-001
        phase: CI
        secondaryActors:
          - UC-ACTOR-003
        preconditions:
          - speckeeper is installed
          - Model files exist under design/
        postconditions:
          - Validation results are reported
        relatedRequirements:
          - FR-400
          - FR-401
          - FR-500
          - FR-701
        mainFlow:
          - stepNumber: 1
            type: user_action
            description: Run speckeeper lint
          - stepNumber: 2
            type: system_response
            description: Verify ID uniqueness
          - stepNumber: 3
            type: system_response
            description: Verify reference integrity
          - stepNumber: 4
            type: system_response
            description: Verify layer dependency direction
          - stepNumber: 5
            type: system_response
            description: Display verification results to stdout
        relations:
          - type: traces
            target: FR-500
            description: Related to lint command requirement
          - type: traces
            target: FR-701
            description: Related to inter-model relation requirement
      - id: UC-011
        name: Detect Drift
        description: CI/CD system detects manual edits to generated artifacts
        actor: UC-ACTOR-SYS-001
        phase: CI
        preconditions:
          - speckeeper is installed
          - Generated artifacts exist under docs/ or specs/
        postconditions:
          - Exit with code 1 if drift exists
        relatedRequirements:
          - FR-500
        mainFlow:
          - stepNumber: 1
            type: user_action
            description: Run speckeeper drift
          - stepNumber: 2
            type: system_response
            description: Regenerate artifacts from TS models
          - stepNumber: 3
            type: system_response
            description: Compare existing artifacts with regenerated artifacts
          - stepNumber: 4
            type: system_response
            description: Report if differences exist
        relations:
          - type: traces
            target: FR-500
            description: Related to drift check requirement
      - id: UC-012
        name: Check Contract Consistency
        description: CI/CD system verifies consistency between implementation and contract
        actor: UC-ACTOR-SYS-001
        phase: CI
        preconditions:
          - speckeeper is installed
          - Implementation code and contract definition exist
        postconditions:
          - Contract violations are reported if any
        relatedRequirements:
          - FR-600
        mainFlow:
          - stepNumber: 1
            type: user_action
            description: Run speckeeper check contract
          - stepNumber: 2
            type: system_response
            description: Compare implementation and contract definition
          - stepNumber: 3
            type: system_response
            description: Report if violations exist
        relations:
          - type: traces
            target: FR-600
            description: Related to check command requirement
