model: test-ref
specs:
  - id: TEST-003
    description: Config file loading utility verification test
    source:
      path: test/utils/config-loader.test.ts
      framework: vitest
      resultPath: test-results/all.json
    verifiesRequirements:
      - CR-002
    testCasePatterns:
      - acceptanceCriteriaId: CR-002-01
        pattern: default config|no config file
        description: Default config test
    relations:
      - type: verifies
        target: CR-002
        description: Verifies acceptance criteria for CR-002
  - id: TEST-004
    description: File writing utility verification test
    source:
      path: test/utils/file-writer.test.ts
      framework: vitest
      resultPath: test-results/all.json
    verifiesRequirements:
      - FR-300
    testCasePatterns:
      - acceptanceCriteriaId: FR-300-01
        pattern: write.*file|file.*writ
        description: File output test
    relations:
      - type: verifies
        target: FR-300
        description: Verifies acceptance criteria for FR-300
  - id: TEST-018
    description: Model level configuration feature verification test
    source:
      path: test/core/model-level.test.ts
      framework: vitest
      resultPath: test-results/all.json
    verifiesRequirements:
      - FR-104
    testCasePatterns:
      - acceptanceCriteriaId: FR-104-08
        pattern: FR-104-08.*modelLevel configuration
        description: modelLevel setting test
      - acceptanceCriteriaId: FR-104-09
        pattern: FR-104-09.*level.*property
        description: level property retrieval test
    relations:
      - type: verifies
        target: FR-104
        description: Verifies acceptance criteria for FR-104
  - id: TEST-019
    description: Project initialization feature verification test
    source:
      path: test/cli/init.test.ts
      framework: vitest
      resultPath: test-results/all.json
    verifiesRequirements:
      - FR-105
    implementsCommand: CMD-INIT
    testCasePatterns:
      - acceptanceCriteriaId: FR-105-01
        pattern: FR-105-01.*creates design/
        description: Design directory creation test
      - acceptanceCriteriaId: FR-105-02
        pattern: FR-105-02.*speckeeper.config.ts
        description: Config file generation test
      - acceptanceCriteriaId: FR-105-03
        pattern: FR-105-03.*package.json
        description: Package.json generation test
      - acceptanceCriteriaId: FR-105-04
        pattern: FR-105-04.*tsconfig.json
        description: tsconfig.json generation test
      - acceptanceCriteriaId: FR-105-05
        pattern: FR-105-05.*model definitions
        description: Model definitions generation test
      - acceptanceCriteriaId: FR-105-06
        pattern: FR-105-06.*sample specification
        description: Sample specification generation test
      - acceptanceCriteriaId: FR-105-07
        pattern: FR-105-07.*speckeeper lint
        description: Generated project lint test
      - acceptanceCriteriaId: FR-105-08
        pattern: FR-105-08.*typecheck
        description: Generated project typecheck test
      - acceptanceCriteriaId: FR-105-09
        pattern: FR-105-09.*--force
        description: Force overwrite test
      - acceptanceCriteriaId: FR-105-10
        pattern: FR-105-10.*skips package.json
        description: Skip existing package.json test
    relations:
      - type: verifies
        target: FR-105
        description: Verifies acceptance criteria for FR-105
      - type: verifies
        target: CMD-INIT
        description: Verifies CMD-INIT
  - id: TEST-020
    description: Lint command verification test
    source:
      path: test/cli/lint.test.ts
      framework: vitest
    verifiesRequirements:
      - FR-401
      - FR-402
    implementsCommand: CMD-LINT
    testCasePatterns:
      - acceptanceCriteriaId: FR-401-01
        pattern: FR-401-01.*lintAll.*exits.*code 1
        description: Error-severity results trigger exit(1)
      - acceptanceCriteriaId: FR-401-03
        pattern: FR-401-03.*exits.*code 1.*error message
        description: Ref-exists error triggers exit and output
      - acceptanceCriteriaId: FR-402-01
        pattern: FR-402-01.*lintAll.*outputs warning
        description: Warnings output without exit
    relations:
      - type: verifies
        target: FR-401
        description: Verifies acceptance criteria for FR-401
      - type: verifies
        target: FR-402
        description: Verifies acceptance criteria for FR-402
      - type: verifies
        target: CMD-LINT
        description: Verifies CMD-LINT
  - id: TEST-021
    description: Check command verification test
    source:
      path: test/cli/check.test.ts
      framework: vitest
    verifiesRequirements:
      - FR-602
      - FR-603
    implementsCommand: CMD-CHECK
    testCasePatterns:
      - acceptanceCriteriaId: FR-602-01
        pattern: FR-602-01.*check.*consistency
        description: Check runs external SSOT check
      - acceptanceCriteriaId: FR-602-04
        pattern: FR-602-04.*skips.*without external
        description: Skips models without external source
      - acceptanceCriteriaId: FR-603-03
        pattern: FR-603-03.*exits.*code 1.*outputs.*error
        description: Outputs error/warning messages and exits
    relations:
      - type: verifies
        target: FR-602
        description: Verifies acceptance criteria for FR-602
      - type: verifies
        target: FR-603
        description: Verifies acceptance criteria for FR-603
      - type: verifies
        target: CMD-CHECK
        description: Verifies CMD-CHECK
  - id: TEST-022
    description: Build command verification test
    source:
      path: test/cli/build.test.ts
      framework: vitest
    verifiesRequirements:
      - FR-300
      - FR-301
    implementsCommand: CMD-BUILD
    testCasePatterns:
      - acceptanceCriteriaId: FR-300-01
        pattern: FR-300-01.*exporter\.single.*batchWriteFiles
        description: Calls exporter and passes to batchWriteFiles
      - acceptanceCriteriaId: FR-301-05
        pattern: FR-301-05.*exporter\.single.*identical arguments
        description: Same arguments on repeated builds
    relations:
      - type: verifies
        target: FR-300
        description: Verifies acceptance criteria for FR-300
      - type: verifies
        target: FR-301
        description: Verifies acceptance criteria for FR-301
      - type: verifies
        target: CMD-BUILD
        description: Verifies CMD-BUILD
  - id: TEST-023
    description: Impact command verification test
    source:
      path: test/cli/impact.test.ts
      framework: vitest
    verifiesRequirements:
      - FR-700
    implementsCommand: CMD-IMPACT
    testCasePatterns:
      - acceptanceCriteriaId: FR-700-01
        pattern: FR-700-01.*target info.*analysis phase
        description: Reaches analysis phase for valid ID
      - acceptanceCriteriaId: FR-700-03
        pattern: FR-700-03.*depth value.*--depth
        description: Outputs depth from --depth option
    relations:
      - type: verifies
        target: FR-700
        description: Verifies acceptance criteria for FR-700
      - type: verifies
        target: CMD-IMPACT
        description: Verifies CMD-IMPACT
  - id: TEST-024
    description: Drift command verification test
    source:
      path: test/cli/drift.test.ts
      framework: vitest
    verifiesRequirements:
      - FR-500
    implementsCommand: CMD-DRIFT
    testCasePatterns:
      - acceptanceCriteriaId: FR-500-01
        pattern: FR-500-01.*No drift detected.*content match
        description: No drift when content matches
      - acceptanceCriteriaId: FR-500-02
        pattern: FR-500-02.*exits.*code 1.*failOnDrift
        description: Exits with code 1 on failOnDrift
    relations:
      - type: verifies
        target: FR-500
        description: Verifies acceptance criteria for FR-500
      - type: verifies
        target: CMD-DRIFT
        description: Verifies CMD-DRIFT
  - id: TEST-025
    description: New command verification test
    source:
      path: test/cli/new.test.ts
      framework: vitest
    verifiesRequirements:
      - FR-104
    implementsCommand: CMD-NEW
    testCasePatterns:
      - acceptanceCriteriaId: FR-104-01
        pattern: FR-104-01.*available model types header
        description: Outputs model types header when type omitted
    relations:
      - type: verifies
        target: FR-104
        description: Verifies acceptance criteria for FR-104
      - type: verifies
        target: CMD-NEW
        description: Verifies CMD-NEW
  - id: TEST-026
    description: Scaffold integration verification test (mermaid parsing, class-based generation)
    source:
      path: test/scaffold/integration.test.ts
      framework: vitest
    verifiesRequirements:
      - FR-106
    implementsCommand: CMD-SCAFFOLD
    testCasePatterns:
      - acceptanceCriteriaId: FR-106-01
        pattern: base template.*core factory|generated models.*base template
        description: Artifact class generates from base template
      - acceptanceCriteriaId: FR-106-03
        pattern: SR.*FR.*NFR.*map to requirement.*de-duplicated
        description: Same-class node aggregation into single model file
      - acceptanceCriteriaId: FR-106-05
        pattern: de-duplicated model files.*spec data
        description: Model file generation with naming conventions
    relations:
      - type: verifies
        target: FR-106
        description: Verifies acceptance criteria for FR-106
      - type: verifies
        target: CMD-SCAFFOLD
        description: Verifies CMD-SCAFFOLD
