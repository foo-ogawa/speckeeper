      metadata:
        type: object
        properties:
          tool:
            type: string
          command:
            type: string
          version:
            type: string
          generatedAt:
            type: string
          adapter:
            type: string
          model:
            type: string
    required:
      - summary
      - riskLevel
      - findings
      - criteriaProposals
