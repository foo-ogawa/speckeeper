spec-review-request:
  version: 1
  description: Request to execute a spec-review-related LLM task
  schema:
    type: object
    properties:
      task_id:
        type: string
        description: Identifier of the task to execute
      context:
        type: string
        description: Built context string from spec definitions, lint results, config, and scanner data
    required:
      - task_id
      - context

requirement-audit-result:
  version: 1
  description: >-
    Result of a requirement quality audit task.
    Schema mirrors cli-contract.yaml#/components/schemas/RequirementAuditResult.
  schema:
    type: object
    properties:
      summary:
        type: string
      riskLevel:
        type: string
        enum: [low, medium, high, critical]
      findings:
        type: array
        items:
          type: object
          properties:
            id:
              type: string
            severity:
              type: string
              enum: [info, warning, error, critical]
            category:
              type: string
            target:
              type: string
            location:
              type: string
            message:
              type: string
            recommendation:
              type: string
            confidence:
              type: number
              minimum: 0
              maximum: 1
            evidence:
              type: array
              items:
                type: object
                properties:
                  kind:
                    type: string
                    enum: [file, command, schema, diff, stdout, stderr, text]
                  target:
                    type: string
                  location:
                    type: string
                  excerpt:
                    type: string
            details:
              type: object
              additionalProperties: true
          required: [severity, category, message]
      recommendedActions:
        type: array
        items:
          type: object
          properties:
            kind:
              type: string
              enum: [run_command, edit_file, review, confirm, block, ignore]
            title:
              type: string
            command:
              type: string
            target:
              type: string
            rationale:
              type: string
          required: [kind, title]
      metadata:
        type: object
        properties:
          tool:
            type: string
          command:
            type: string
          version:
            type: string
          generatedAt:
            type: string
          adapter:
            type: string
          model:
            type: string
    required:
      - summary
      - riskLevel
      - findings

trace-link-result:
  version: 1
  description: >-
    Result of propose-trace-links task.
    Schema mirrors cli-contract.yaml#/components/schemas/TraceLinkResult.
  schema:
    type: object
    properties:
      summary:
        type: string
      riskLevel:
        type: string
        enum: [low, medium, high, critical]
      findings:
        type: array
        items:
          type: object
          properties:
            severity:
              type: string
              enum: [info, warning, error, critical]
            category:
              type: string
            message:
              type: string
            recommendation:
              type: string
          required: [severity, category, message]
      candidateLinks:
        type: array
        items:
          type: object
          properties:
            from:
              type: string
              description: Source spec ID
            relation:
              type: string
              description: Relation type (implements, verifiedBy, satisfies, etc.)
            to:
              type: string
              description: Target ID (api.openApi.operation.xxx, ddl.table.xxx, etc.)
            confidence:
              type: number
              minimum: 0
              maximum: 1
            reason:
              type: string
          required: [from, relation, to, confidence, reason]
      recommendedActions:
        type: array
        items:
          type: object
          properties:
            kind:
              type: string
              enum: [run_command, edit_file, review, confirm, block, ignore]
            title:
              type: string
            command:
              type: string
            target:
              type: string
            rationale:
              type: string
          required: [kind, title]
      metadata:
        type: object
        properties:
          tool:
            type: string
          command:
            type: string
          version:
            type: string
          generatedAt:
            type: string
          adapter:
            type: string
          model:
            type: string
    required:
      - summary
      - riskLevel
      - findings
      - candidateLinks

impact-explain-result:
  version: 1
  description: >-
    Result of explain-impact-result task.
    Schema mirrors cli-contract.yaml#/components/schemas/ImpactExplainResult.
  schema:
    type: object
    properties:
      summary:
        type: string
      riskLevel:
        type: string
        enum: [low, medium, high, critical]
      explanation:
        type: string
        description: Multi-paragraph human-readable explanation in Markdown format.
      findings:
        type: array
        items:
          type: object
          properties:
            severity:
              type: string
              enum: [info, warning, error, critical]
            category:
              type: string
            message:
              type: string
          required: [severity, category, message]
      affectedArtifacts:
        type: array
        items:
          type: object
          properties:
            type:
              type: string
              enum: [spec, api, ddl, test, annotation]
            id:
              type: string
            summary:
              type: string
          required: [type, id, summary]
      testConsiderations:
        type: array
        items:
          type: string
      releaseRisk:
        type: string
        enum: [low, medium, high]
      recommendedActions:
        type: array
        items:
          type: object
          properties:
            kind:
              type: string
              enum: [run_command, edit_file, review, confirm, block, ignore]
            title:
              type: string
            rationale:
              type: string
          required: [kind, title]
      sourceCommand:
        type: string
        description: The command that produced the input (e.g. "speckeeper impact FR-001").
      metadata:
        type: object
        properties:
          tool:
            type: string
          command:
            type: string
          version:
            type: string
          generatedAt:
            type: string
          adapter:
            type: string
          model:
            type: string
    required:
      - summary
      - riskLevel
      - explanation

