# Physical artifacts: imported from artifact-contracts.yaml (shared registry)
# Ephemeral artifacts: defined inline (dynamic inputs with no fixed path)

$refs:
  - "./physical-artifacts.yaml"

spec-definitions:
  owner: spec-quality-reviewer
  producers: []
  editors:
    - spec-quality-reviewer
  consumers:
    - spec-quality-reviewer
  states: [draft, reviewed]
  required_validations:
    - spec-lint-validation
  visibility: project

agent-review-output:
  type: doc
  description: >-
    Structured output from spec-quality-reviewer agent tasks.
    Conforms to AgentAuditResult schema or its domain-specific
    extensions (TraceLinkResult, ImpactExplainResult, AcceptanceCriteriaResult).
  owner: spec-quality-reviewer
  producers:
    - spec-quality-reviewer
  editors:
    - spec-quality-reviewer
  consumers: []
  states: [generated, validated]
  required_validations:
    - output-schema-validation
  visibility: project
